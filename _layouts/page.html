---
layout: default
post_class: post-template page-template
---

<header class="main-header post-head {% if page.cover %}"
    style="background-image: url({{ page.cover }}) {%else%}no-cover{% endif %}">
</header>


<main class="content" role="main">
    <div class="page-shell{% if page.hide_profile_card %} no-profile-card{% endif %}">
    {% unless page.hide_profile_card %}
        {% include profile_card.html %}
    {% endunless %}
    <article class="post">
        {% unless page.hide_title %}
        <h1 class="post-title">{{ page.title }}</h1>
        {% endunless %}

        <section class="post-content">
            {{content}}
        </section>

    </article>
    </div>

</main>
