<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" href="{{ '/images/favicon.ico' | relative_url }}">
    <script>
      (function() {
        var savedTheme = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = savedTheme || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    {% if site.analytics.provider == "google-analytics-4" and site.analytics.google.tracking_id %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google.tracking_id }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.analytics.google.tracking_id }}');
    </script>
    {% endif %}
  </head>
  <body>
    <header class="topbar">
      <a class="topbar__name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="nav" aria-label="Main navigation">
        <a href="{{ '/cv/' | relative_url }}">CV</a>
        <a href="{{ '/publications/' | relative_url }}">Publications</a>
        <a href="{{ '/research/' | relative_url }}">Research</a>
        <a href="{{ '/projects/' | relative_url }}">Projects</a>
        <a href="{{ '/field-work/' | relative_url }}">Field Work</a>
        <a href="{{ '/study/' | relative_url }}">Study</a>
        <a href="{{ '/notes/' | relative_url }}">Notes</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Switch color theme" data-theme-toggle>Dark</button>
    </header>

    <div class="site">
      {% include sidebar.html %}
      <main class="content">
        {{ content }}
      </main>
    </div>
    <script>
      (function() {
        var button = document.querySelector('[data-theme-toggle]');
        if (!button) return;

        function setTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          localStorage.setItem('theme', theme);
          button.textContent = theme === 'dark' ? 'Light' : 'Dark';
          button.setAttribute('aria-label', 'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' theme');
        }

        setTheme(document.documentElement.getAttribute('data-theme') || 'light');
        button.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          setTheme(current === 'dark' ? 'light' : 'dark');
        });
      })();
    </script>
  </body>
</html>
