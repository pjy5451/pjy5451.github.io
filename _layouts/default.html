<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.url == "/" %}{{ site.title }}{% elsif page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" href="{{ '/images/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="alternate icon" href="{{ '/images/favicon.ico' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/images/apple-touch-icon-180x180.png' | relative_url }}">
    <link rel="manifest" href="{{ '/images/manifest.json' | relative_url }}">
    <script>
      (function() {
        var savedTheme = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = savedTheme || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">
    {% if site.analytics.provider == "google-analytics-4" and site.analytics.google.tracking_id %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google.tracking_id }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.analytics.google.tracking_id }}');
    </script>
    {% endif %}
  </head>
  <body>
    <header class="topbar">
      <a class="topbar__name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="nav" aria-label="Main navigation">
        <a href="{{ '/cv/' | relative_url }}"{% if page.url contains '/cv/' %} class="is-active"{% endif %}>CV</a>
        <a href="{{ '/publications/' | relative_url }}"{% if page.url contains '/publications/' %} class="is-active"{% endif %}>Publications</a>
        <a href="{{ '/talks/' | relative_url }}"{% if page.url contains '/talks/' %} class="is-active"{% endif %}>Talks</a>
        <a href="{{ '/research/' | relative_url }}"{% if page.url contains '/research/' or page.url contains '/projects/' %} class="is-active"{% endif %}>Research</a>
        <a href="{{ '/field-sites/' | relative_url }}"{% if page.url contains '/field-sites/' %} class="is-active"{% endif %}>Field Sites</a>
        <a href="{{ '/study/' | relative_url }}"{% if page.url contains '/study/' %} class="is-active"{% endif %}>Study</a>
        <a href="{{ '/notes/' | relative_url }}"{% if page.url contains '/notes/' %} class="is-active"{% endif %}>Notes</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Switch color theme" data-theme-toggle>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 14.6A7.7 7.7 0 0 1 9.4 3a8.7 8.7 0 1 0 11.6 11.6z"/>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2.5v2M12 19.5v2M4.6 4.6 6 6M18 18l1.4 1.4M2.5 12h2M19.5 12h2M4.6 19.4 6 18M18 6l1.4-1.4"/>
        </svg>
      </button>
    </header>

    <div class="site">
      {% include sidebar.html %}
      <main class="content">
        {{ content }}
      </main>
    </div>
    <script>
      (function() {
        var button = document.querySelector('[data-theme-toggle]');
        if (!button) return;

        function setTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          localStorage.setItem('theme', theme);
          button.setAttribute('aria-label', 'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' theme');
        }

        setTheme(document.documentElement.getAttribute('data-theme') || 'light');
        button.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          setTheme(current === 'dark' ? 'light' : 'dark');
        });
      })();
    </script>
  </body>
</html>
