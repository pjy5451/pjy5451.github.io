    location: Saemangeum / Bongdong, Jeonbuk, South Korea
    image: /images/field-sites/wim-field-tests/wim-field-test-roadside.jpg
    field_focus: High-speed vehicle load sensing and WIM DAQ validation.
    period: Field validation tests
    data_summary: High-speed load signals, load-event intervals, filtered and downsampled signal records, and axle-related event labels.
    sites:
    - Saemangeum
    - Bongdong
