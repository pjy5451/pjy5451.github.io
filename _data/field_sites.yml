groups:
- title: Bridge and Infrastructure Sites
  sites:
  - name: Seongsan Bridge
    key: seongsan-bridge
    href: /field-sites/seongsan-bridge/
    summary: Bridge monitoring and field data review using sensing systems for structural response measurement.
    data:
    - Strain and acceleration records
    - Vibration characteristics and displacement-related estimation data
    - Cloud upload status and monitoring logs
  - name: Seosomun Overpass
    key: seosomun-overpass
    href: /field-sites/seosomun-overpass/
    summary: Field deployment and bridge response monitoring under real operating conditions.
    data:
    - Strain, acceleration, and temperature records
    - Vibration response and sensor communication status
    - System operation and field maintenance records
  - name: Paldang Bridge / Paldang Overpass
    key: paldang-bridge-overpass
    href: /field-sites/paldang-bridge-overpass/
    summary: Bridge monitoring and inspection-related measurement experience.
    data:
    - Structural response histories
    - Vibration characteristics and installation records
    - Monitoring-system reliability data
  - name: Cheongdam Bridge and Other Bridge Sites
    key: bridge-field-campaigns
    href: /field-sites/bridge-field-campaigns/
    summary: Bridge inspection, diagnosis, and monitoring support across multiple field campaigns in Korea.
    data:
    - Sensor installation records
    - Response histories and environmental conditions
    - Engineering interpretation notes
- title: Transportation and Vehicle Monitoring Sites
  sites:
  - name: WIM Field Tests
    key: wim-field-tests
    href: /field-sites/wim-field-tests/
    summary: High-speed vehicle load sensing and WIM DAQ validation under driving conditions.
    data:
    - High-speed load signals and load-event intervals
    - Filtered and downsampled signal records
    - Axle-related records and event labels
  - name: OBM Field Validation
    key: obm-field-validation
    href: /field-sites/obm-field-validation/
    summary: Vehicle-mounted sensing for dynamic operating-weight estimation.
    data:
    - Vehicle-state signals
    - Dynamic weight correction data
    - Validation records against WIM-related conditions
  - name: Freight and Rail-related Monitoring
    key: freight-rail-monitoring
    href: /field-sites/freight-rail-monitoring/
    summary: Event-oriented field sensing and signal review for transportation safety monitoring.
    data:
    - Event records and time histories
    - Field measurement logs
    - Signal review notes
- title: Prefabricated and Port Structure Sites
  sites:
  - name: Precast Transportation Monitoring
    key: precast-transportation-monitoring
    href: /field-sites/precast-transportation-monitoring/
    summary: Portable sensing for precast members during lifting, loading, transportation, and erection.
    data:
    - Strain and acceleration records
    - Movement-stage and transportation-event records
    - Installation-stage response histories
  - name: Port / Quay Wall Monitoring
    key: port-quay-wall-monitoring
    href: /field-sites/port-quay-wall-monitoring/
    summary: Ruggedized multisensory monitoring for quay wall and port-structure events.
    data:
    - Event-triggered sensor records
    - Waterproof sensor operation logs
    - Cloud communication data and AI-assisted event labels
