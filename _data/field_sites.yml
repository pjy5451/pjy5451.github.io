groups:
- title: Long-Term Monitoring Sites
  sites:
  - name: Seongsan Bridge
    key: seongsan-bridge
    href: /field-sites/seongsan-bridge/
    summary: Bridge monitoring and field data review using sensing systems for structural response measurement.
    location: Mapo-gu / Yeongdeungpo-gu, Seoul, South Korea
    image: /images/field-sites/seongsan-bridge/seongsan-bridge-monitoring-installation.png
    field_focus: Long-term structural response monitoring and real-time dashboard visualization.
    period: Field deployment and operation
    data_summary: Strain, acceleration, vibration characteristics, displacement-related estimates, cloud upload status, and dashboard operation logs.
    video:
      id: sJ2qWYvAp-c
      title: Seongsan Bridge real-time monitoring dashboard demonstration
      caption: Real-time dashboard visualization developed for Seongsan Bridge monitoring results.
    sites:
    - Seongsan Bridge
    data:
    - Strain and acceleration records
    - Vibration characteristics and displacement-related estimation data
    - Cloud upload status and monitoring logs
  - name: Seosomun Overpass
    key: seosomun-overpass
    href: /field-sites/seosomun-overpass/
    summary: Long-term cloud-connected monitoring deployment on a concrete overpass in central Seoul.
    location: Jung-gu, Seoul, South Korea
    image: /images/field-sites/seosomun-overpass/annotated-system-overview.jpg
    field_focus: Long-term bridge response monitoring using acceleration, strain, and temperature sensing.
    period: Long-term field monitoring
    date_range: 2023.12.28 - 2025.02.06
    data_summary: Three-axis acceleration, three-channel strain, one-channel temperature, and cloud-uploaded operation records collected from the installed field system.
    sites:
    - Seosomun Overpass
    data:
    - Three-axis acceleration, three-channel strain, and one-channel temperature records
    - 100 Hz measurements collected in 10-minute windows every hour
    - Cloud upload status, system operation logs, and field maintenance records
  - name: Choha-cheon Bridge
    key: choha-cheon-bridge
    href: /field-sites/choha-cheon-bridge/
    summary: QR-code-based data acquisition and weekly strain monitoring for a prefabricated bridge member lifecycle monitoring system.
    location: South Korea
    image: /images/field-sites/choha-cheon-bridge/choha-cheon-bridge-qr-monitoring.jpg
    field_focus: Lifecycle monitoring of prefabricated bridge members using QR-linked strain data acquisition.
    period: Long-term field monitoring
    date_range: 2022.10 - Present
    data_summary: Weekly simultaneous eight-channel strain measurements and QR-code-based data acquisition records for prefabricated member lifecycle monitoring.
    video:
      id: oE50q7iXPcs
      heading: System demonstration
      title: Choha-cheon Bridge QR-based data acquisition system demonstration
      caption: Demonstration of the QR-code-based data acquisition workflow used for prefabricated member lifecycle monitoring.
    sites:
    - Choha-cheon Bridge
    data:
    - Weekly simultaneous eight-channel strain measurements
    - QR-code-based data acquisition records
    - Lifecycle monitoring records for prefabricated bridge members
- title: Transportation and Specialized Field Tests
