---
layout: page
title: Search
description: Search Junyoung Park's research portfolio, projects, publications, patents, and notes.
---

<div class="search-panel">
    <input class="site-search-input" id="site-search-input" type="search" placeholder="Search projects, publications, patents, notes..." autocomplete="off" />
    <p class="search-status" id="site-search-status">Type a keyword such as bridge monitoring, IoT sensing, WIM, patent, or Python.</p>
</div>

<div class="search-results" id="site-search-results"></div>

<script>
  (function() {
    var input = document.getElementById('site-search-input');
    var results = document.getElementById('site-search-results');
    var status = document.getElementById('site-search-status');
    var index = [];

    function normalize(value) {
      return (value || '').toString().toLowerCase();
    }

    function escapeHtml(value) {
      return (value || '').replace(/[&<>"']/g, function(match) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[match];
      });
    }

    function score(item, terms) {
      var title = normalize(item.title);
      var description = normalize(item.description);
      var content = normalize(item.content);
      var total = 0;

      terms.forEach(function(term) {
        if (title.indexOf(term) !== -1) total += 8;
        if (description.indexOf(term) !== -1) total += 4;
        if (content.indexOf(term) !== -1) total += 1;
      });

      return total;
    }

    function render(items) {
      if (!items.length) {
        results.innerHTML = '';
        status.textContent = 'No results found.';
        return;
      }

      status.textContent = items.length + ' result' + (items.length > 1 ? 's' : '') + ' found.';
      results.innerHTML = items.slice(0, 20).map(function(item) {
        return '<article class="search-result">' +
          '<h2><a href="' + item.url + '">' + escapeHtml(item.title) + '</a></h2>' +
          '<p>' + escapeHtml(item.description || item.content || '') + '</p>' +
          '<span>' + escapeHtml(item.type || 'Page') + '</span>' +
        '</article>';
      }).join('');
    }

    function runSearch() {
      var terms = normalize(input.value).split(/\s+/).filter(Boolean);
      if (!terms.length) {
        results.innerHTML = '';
        status.textContent = 'Type a keyword such as bridge monitoring, IoT sensing, WIM, patent, or Python.';
        return;
      }

      render(index.map(function(item) {
        return {
          item: item,
          score: score(item, terms)
        };
      }).filter(function(result) {
        return result.score > 0;
      }).sort(function(a, b) {
        return b.score - a.score;
      }).map(function(result) {
        return result.item;
      }));
    }

    fetch('{{ "/search.json" | relative_url }}')
      .then(function(response) { return response.json(); })
      .then(function(data) {
        index = data;
        input.addEventListener('input', runSearch);
        var params = new URLSearchParams(window.location.search);
        var query = params.get('q');
        if (query) {
          input.value = query;
          runSearch();
        }
      })
      .catch(function() {
        status.textContent = 'Search index could not be loaded.';
      });
  })();
</script>
