<aside class="profile" aria-label="Profile">
  <img class="profile__photo" src="{{ site.author.avatar | relative_url }}" alt="{{ site.author.name }}">
  <h1 class="profile__name">{{ site.author.name }}</h1>
  <p class="profile__role">{{ site.author.role }}</p>
  <p class="profile__degree">{{ site.author.degree }}</p>

  <div class="profile__links">
    <a href="mailto:{{ site.author.email }}">Email</a>
    <a href="{{ site.author.googlescholar }}">Google Scholar</a>
    <a href="{{ site.author.orcid }}">ORCID</a>
    <a href="{{ site.author.linkedin }}">LinkedIn</a>
    <a href="{{ site.author.github }}">GitHub</a>
  </div>

  <a class="profile__cv" href="{{ site.author.cv | relative_url }}">Download CV</a>
</aside>
